<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScriptsReader</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <p class="eyebrow">ScriptsReader</p>
        <h1>对白阅读器</h1>
        <p class="subtitle">为游戏对白学习而设计的剧本工作台</p>
      </div>

      <section class="panel compact-panel">
        <label class="input-label" for="library-search">筛选剧集 / 集标题</label>
        <input id="library-search" type="search" placeholder="例如 Person of Interest / Reese">
      </section>

      <section class="panel compact-panel">
        <div class="section-heading">
          <h2>获取剧本</h2>
          <button id="rebuild-library" class="ghost-btn">重建索引</button>
        </div>
        <div class="action-row">
          <button id="refresh-catalog" class="secondary-btn">刷新目录</button>
          <span id="catalog-status" class="muted"></span>
        </div>
        <label class="input-label" for="catalog-search">搜索剧名（需先刷新目录）</label>
        <div class="search-box-row">
          <input id="catalog-search" type="search" placeholder="输入剧名关键词搜索…">
          <button id="run-catalog-search" class="ghost-btn">搜索</button>
        </div>
        <div id="catalog-results" class="catalog-results"></div>
        <details class="advanced-toggle">
          <summary class="muted">高级：手动输入下载信息</summary>
          <div class="download-form">
            <label class="input-label">ForeverDreaming 索引页 URL + 剧名</label>
            <input id="fd-index-url" type="text" placeholder="https://transcripts.foreverdreaming.org/viewforum.php?f=23">
            <div class="search-box-row" style="margin-top:6px">
              <input id="fd-show-name" type="text" placeholder="剧名，如 Fringe">
              <button id="fd-download" class="ghost-btn">下载</button>
            </div>
          </div>
          <div class="download-form">
            <label class="input-label">Springfield slug（如知道 slug 可直接输入）</label>
            <div class="search-box-row">
              <input id="adv-springfield-slug" type="text" placeholder="person-of-interest">
              <button id="adv-springfield-download" class="ghost-btn">下载</button>
            </div>
          </div>
        </details>
        <label class="upload-box" for="manual-import">
          <span>手动导入</span>
          <small>支持 md / txt / json / srt / ass / fountain</small>
        </label>
        <input id="manual-import" type="file" multiple hidden>
        <div id="download-status" class="mini-list"></div>
      </section>

      <section class="panel tree-panel">
        <div class="section-heading">
          <h2>剧本库</h2>
          <span id="library-count" class="muted"></span>
        </div>
        <div id="library-tree" class="library-tree"></div>
      </section>
    </aside>

    <main class="main-content">
      <header class="toolbar panel">
        <div>
          <p class="eyebrow">当前阅读</p>
          <h2 id="episode-title">选择一集开始</h2>
          <p id="episode-meta" class="subtitle"></p>
        </div>
        <div class="toolbar-actions">
          <input id="episode-search" type="search" placeholder="在当前集内搜索对白">
          <button id="clear-filters" class="ghost-btn">清空角色过滤</button>
        </div>
      </header>

      <section class="workspace-grid">
        <section class="panel dialogue-panel">
          <div class="section-heading sticky-heading">
            <h2>对白流</h2>
            <span id="line-count" class="muted"></span>
            <button id="translate-all-btn" class="ghost-btn translate-all-btn" disabled>⚡ 全文翻译</button>
          </div>
          <div id="dialogue-list" class="dialogue-list empty-state">
            先从左侧导入或选择剧本。
          </div>
        </section>

        <aside class="right-rail">
          <section class="panel">
            <div class="section-heading">
              <h2>全库搜索</h2>
              <span class="muted">跨全部剧本</span>
            </div>
            <div class="search-box-row">
              <input id="global-search" type="search" placeholder="搜索对白关键词或角色名">
              <button id="run-global-search" class="ghost-btn">搜索</button>
            </div>
            <div id="search-results" class="search-results empty-state">输入关键词后搜索。</div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h2>角色过滤</h2>
              <span id="speaker-count" class="muted"></span>
            </div>
            <div id="speaker-filters" class="speaker-filters empty-state">暂无角色</div>
            <div class="search-box-row" style="margin-top:10px; margin-bottom:8px;">
              <button id="track-speaker-btn" class="ghost-btn" disabled>跨集追踪所选角色</button>
            </div>
            <div id="speaker-track-results" class="search-results empty-state">选中 1 个角色后可跨集追踪其全部台词。</div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h2>逐行翻译</h2>
              <span class="muted">DeepL / Ollama</span>
            </div>
            <div id="translation-panel" class="translation-panel empty-state">
              点击任意对白行上的"译"按钮查看结果。
            </div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h2>AI 助手</h2>
              <span id="ollama-status" class="muted">检测中…</span>
            </div>
            <div class="ai-model-row">
              <select id="ollama-model" class="model-select">
                <option value="">加载模型中…</option>
              </select>
              <button id="ollama-refresh-models" class="ghost-btn" title="刷新模型列表">⟳</button>
            </div>
            <div class="ai-quick-actions">
              <button class="ai-action-btn" data-ai-task="summary">📋 本集摘要</button>
              <button class="ai-action-btn" data-ai-task="profile" id="ai-profile-btn" disabled>🎭 角色画像</button>
            </div>
            <div id="ai-panel" class="ai-panel empty-state">
              选中对白后点击"析"按钮，或使用上方快捷操作。
            </div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <h2>收藏库</h2>
              <span id="collection-count" class="muted">0 条</span>
            </div>
            <div class="collection-row">
              <select id="collection-select" class="model-select">
                <option value="">选择收藏夹</option>
              </select>
              <button id="collection-delete" class="ghost-btn" title="删除收藏夹">删</button>
            </div>
            <div class="collection-row exports-row">
              <button id="collection-export-md" class="ghost-btn">导出 MD</button>
              <button id="collection-export-json" class="ghost-btn">导出 JSON</button>
            </div>
            <div class="collection-row">
              <input id="collection-name" type="text" placeholder="新收藏夹名称">
              <button id="collection-create" class="ghost-btn">新建</button>
            </div>
            <div class="collection-row">
              <input id="collection-filter" type="search" placeholder="按标签/关键词筛选收藏">
            </div>
            <div id="collection-items" class="collection-items empty-state">暂无收藏内容</div>
          </section>
        </aside>
      </section>
    </main>
  </div>

  <script src="/static/app.js" defer></script>
</body>
</html>
